<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZERO — Voice AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #04040c;
      --surface:  #0c0c18;
      --surface2: #12121e;
      --crimson:  #c8102e;
      --crimson2: #ff1a3e;
      --dim:      #5a0b1a;
      --gold:     #c9a84c;
      --gold2:    #f0cc70;
      --purple:   #6b21a8;
      --text:     #e8dfc8;
      --muted:    #6a6050;
      --border:   #1c1c2c;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    /* ── Scanlines overlay ─────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.08) 2px,
        rgba(0,0,0,.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Ambient glow ──────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 35% at 50% 0%,   rgba(200,16,46,.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 100% 100%, rgba(107,33,168,.07) 0%, transparent 50%),
        radial-gradient(ellipse 40% 20% at 0% 80%,   rgba(200,16,46,.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ────────────────────────────────── */
    header {
      flex-shrink: 0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid rgba(200,16,46,.2);
      background: linear-gradient(180deg, rgba(200,16,46,.06), transparent);
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--crimson), var(--gold), var(--crimson), transparent);
      opacity: .5;
    }

    /* Geass eye SVG logo */
    .logo-wrap { width: 40px; height: 40px; flex-shrink: 0; }
    .logo-wrap svg { width: 100%; height: 100%; }
    .geass-ring { animation: gring 8s linear infinite; transform-origin: 20px 20px; }
    @keyframes gring { to { transform: rotate(360deg); } }
    .geass-pupil { animation: gpulse 2s ease-in-out infinite; }
    @keyframes gpulse {
      0%,100% { opacity: .7; r: 3; }
      50%      { opacity: 1;  r: 4; }
    }

    .header-info h1 {
      font-family: 'Cinzel', serif;
      font-size: 14px; font-weight: 900;
      letter-spacing: 5px;
      color: var(--crimson2);
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(200,16,46,.5);
    }
    .header-info p {
      font-size: 10px; letter-spacing: 3px;
      color: var(--muted); margin-top: 1px;
      text-transform: uppercase;
    }

    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .status-pip {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--crimson);
      box-shadow: 0 0 6px var(--crimson), 0 0 14px rgba(200,16,46,.4);
      animation: pip 2s ease-in-out infinite;
    }
    .status-pip.offline { background: #333; box-shadow: none; animation: none; }
    @keyframes pip { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    /* ── Divider ───────────────────────────────── */
    .gold-line {
      height: 1px; flex-shrink: 0;
      background: linear-gradient(90deg, transparent, var(--dim), var(--gold), var(--dim), transparent);
      opacity: .4;
    }

    /* ── Chat ──────────────────────────────────── */
    #chat {
      flex: 1; overflow-y: auto;
      padding: 20px 16px 10px;
      display: flex; flex-direction: column; gap: 20px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    /* ── Messages ──────────────────────────────── */
    .msg { display: flex; gap: 10px; max-width: 86%; animation: msgIn .3s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; border: 1px solid var(--border);
      position: relative;
    }
    .msg.ai .avatar {
      background: radial-gradient(circle, #1a0010, #04040c);
      border-color: var(--dim);
      box-shadow: 0 0 10px rgba(200,16,46,.2);
    }
    .msg.user .avatar { background: #0d0014; border-color: #2a1030; }

    .bubble {
      padding: 12px 16px;
      font-size: 14px; line-height: 1.7; font-weight: 400;
      position: relative;
    }
    .msg.ai .bubble {
      background: var(--surface);
      border: 1px solid rgba(200,16,46,.15);
      border-left: 2px solid var(--crimson);
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
      box-shadow: inset 0 0 20px rgba(200,16,46,.03), 0 0 20px rgba(0,0,0,.4);
    }
    .msg.user .bubble {
      background: #100018;
      border: 1px solid rgba(107,33,168,.3);
      border-right: 2px solid var(--purple);
      clip-path: polygon(0 12px, 12px 0, 100% 0, 100% 100%, 0 100%);
      color: #c8b8e0;
    }

    .bubble-label {
      font-family: 'Cinzel', serif;
      font-size: 8px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--crimson); margin-bottom: 7px;
      display: flex; align-items: center; gap: 8px;
    }
    .bubble-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(200,16,46,.5), transparent);
    }

    /* Sources */
    .sources {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid rgba(200,16,46,.1);
    }
    .src-label {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); opacity: .6; margin-bottom: 5px;
    }
    .sources a {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--gold); text-decoration: none;
      padding: 3px 0; opacity: .7; transition: opacity .15s;
    }
    .sources a::before { content: '◈'; font-size: 10px; }
    .sources a:hover { opacity: 1; }

    /* Typing */
    .typing { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      animation: dot 1.4s infinite ease-in-out;
    }
    .dot:nth-child(1) { background: var(--crimson); animation-delay: 0s; }
    .dot:nth-child(2) { background: var(--gold);    animation-delay: .2s; }
    .dot:nth-child(3) { background: var(--crimson); animation-delay: .4s; }
    @keyframes dot {
      0%,80%,100% { transform: scale(.5); opacity: .3; }
      40%          { transform: scale(1.1); opacity: 1; }
    }

    /* ── Welcome sigil ─────────────────────────── */
    #hint {
      margin: auto; text-align: center; padding: 30px 20px; max-width: 280px;
    }
    .sigil-wrap {
      width: 90px; height: 90px; margin: 0 auto 20px;
      animation: sigil 4s ease-in-out infinite;
    }
    @keyframes sigil {
      0%,100% { filter: drop-shadow(0 0 6px rgba(200,16,46,.5)); opacity: .5; }
      50%      { filter: drop-shadow(0 0 18px rgba(200,16,46,.9)); opacity: .9; }
    }
    #hint p {
      font-size: 13px; color: var(--muted); line-height: 1.9; letter-spacing: .5px;
    }
    #hint strong { color: var(--text); font-weight: 600; }

    /* ── Bottom bar ────────────────────────────── */
    #bottom {
      flex-shrink: 0;
      padding: 14px 20px 26px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      border-top: 1px solid rgba(200,16,46,.1);
      background: linear-gradient(0deg, rgba(200,16,46,.05), transparent);
      position: relative; z-index: 10;
    }

    /* Waveform */
    #wave { display: flex; align-items: center; gap: 3px; height: 30px; opacity: 0; transition: opacity .4s; }
    #wave.on { opacity: 1; }
    .bar {
      width: 3px; border-radius: 2px;
      animation: wv 1s ease-in-out infinite;
      transform-origin: center;
    }
    .bar:nth-child(odd)  { background: var(--crimson); }
    .bar:nth-child(even) { background: var(--gold); }
    .bar:nth-child(1)  { height: 5px;  animation-delay: .00s; }
    .bar:nth-child(2)  { height: 13px; animation-delay: .10s; }
    .bar:nth-child(3)  { height: 22px; animation-delay: .20s; }
    .bar:nth-child(4)  { height: 16px; animation-delay: .05s; }
    .bar:nth-child(5)  { height: 28px; animation-delay: .15s; }
    .bar:nth-child(6)  { height: 20px; animation-delay: .25s; }
    .bar:nth-child(7)  { height: 12px; animation-delay: .10s; }
    .bar:nth-child(8)  { height: 18px; animation-delay: .30s; }
    .bar:nth-child(9)  { height: 10px; animation-delay: .05s; }
    .bar:nth-child(10) { height: 5px;  animation-delay: .20s; }
    @keyframes wv { 0%,100% { transform: scaleY(.25); } 50% { transform: scaleY(1); } }

    /* Mic button */
    #mic {
      width: 74px; height: 74px; border-radius: 50%;
      border: 2px solid var(--dim);
      background: radial-gradient(circle at 40% 35%, #1e0818, #04040c);
      cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .25s, transform .15s;
      box-shadow: 0 0 20px rgba(200,16,46,.1), inset 0 0 15px rgba(200,16,46,.08);
    }
    /* Outer rotating ring */
    #mic::before {
      content: '';
      position: absolute; inset: -7px; border-radius: 50%;
      border: 1px solid transparent;
      border-top-color: var(--dim);
      border-bottom-color: var(--gold);
      opacity: .5;
    }
    #mic:hover { border-color: var(--crimson); transform: scale(1.06); }
    #mic:hover::before { border-top-color: var(--crimson); opacity: 1; }

    #mic.recording {
      border-color: var(--crimson2);
      box-shadow: 0 0 0 0 rgba(200,16,46,.7), inset 0 0 15px rgba(200,16,46,.2);
      animation: mpulse 1.5s infinite;
    }
    #mic.recording::before { animation: rspin 1.5s linear infinite; opacity: 1; border-top-color: var(--crimson2); }

    #mic.processing { border-color: var(--gold); cursor: not-allowed; }
    #mic.processing::before { animation: rspin .8s linear infinite; opacity: 1; border-top-color: var(--gold); border-bottom-color: var(--crimson); }

    @keyframes mpulse {
      0%   { box-shadow: 0 0 0 0 rgba(200,16,46,.7), inset 0 0 15px rgba(200,16,46,.25); }
      70%  { box-shadow: 0 0 0 20px rgba(200,16,46,0), inset 0 0 15px rgba(200,16,46,.25); }
      100% { box-shadow: 0 0 0 0 rgba(200,16,46,0), inset 0 0 15px rgba(200,16,46,.25); }
    }
    @keyframes rspin { to { transform: rotate(360deg); } }

    #mic svg { width: 24px; height: 24px; fill: var(--crimson); transition: fill .2s; }
    #mic.processing svg { fill: var(--gold); }

    #lbl {
      font-family: 'Cinzel', serif;
      font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--muted); min-height: 14px; transition: color .2s;
    }
    #lbl.recording  { color: var(--crimson2); }
    #lbl.processing { color: var(--gold); }
    #lbl.speaking   { color: var(--crimson); }

    /* ── Toast ─────────────────────────────────── */
    #toast {
      position: fixed; bottom: 140px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #18020a; border: 1px solid var(--dim);
      color: #ff8898; padding: 9px 18px; font-size: 12px; letter-spacing: .4px;
      border-radius: 2px; opacity: 0; transition: opacity .3s, transform .3s;
      pointer-events: none; z-index: 1000;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo-wrap">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g class="geass-ring">
          <circle cx="20" cy="20" r="18" stroke="#c8102e" stroke-width=".8" stroke-dasharray="4 3" opacity=".4"/>
        </g>
        <circle cx="20" cy="20" r="13" stroke="#c9a84c" stroke-width=".6" opacity=".25"/>
        <ellipse cx="20" cy="20" rx="11" ry="7" stroke="#c8102e" stroke-width="1.2" opacity=".7"/>
        <circle cx="20" cy="20" r="5" stroke="#c8102e" stroke-width="1" opacity=".6"/>
        <circle class="geass-pupil" cx="20" cy="20" r="3" fill="#c8102e"/>
        <circle cx="21.5" cy="18.5" r=".9" fill="#ff8090" opacity=".8"/>
        <line x1="20" y1="2"  x2="20" y2="9"  stroke="#c9a84c" stroke-width=".8" opacity=".5"/>
        <line x1="20" y1="31" x2="20" y2="38" stroke="#c9a84c" stroke-width=".8" opacity=".5"/>
        <line x1="2"  y1="20" x2="9"  y2="20" stroke="#c9a84c" stroke-width=".8" opacity=".4"/>
        <line x1="31" y1="20" x2="38" y2="20" stroke="#c9a84c" stroke-width=".8" opacity=".4"/>
      </svg>
    </div>
    <div class="header-info">
      <h1>Zero</h1>
      <p>Voice Intelligence · Almaty</p>
    </div>
    <div class="header-right">
      <div class="status-pip" id="pip"></div>
    </div>
  </header>

  <div class="gold-line"></div>

  <!-- Chat -->
  <div id="chat">
    <div id="hint">
      <div class="sigil-wrap">
        <svg viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="45" cy="45" r="43" stroke="#c8102e" stroke-width="1" opacity=".4"/>
          <circle cx="45" cy="45" r="34" stroke="#c9a84c" stroke-width=".6" stroke-dasharray="3 4" opacity=".3"/>
          <circle cx="45" cy="45" r="22" stroke="#c8102e" stroke-width="1" opacity=".4"/>
          <ellipse cx="45" cy="45" rx="20" ry="13" stroke="#c8102e" stroke-width="1.5" opacity=".7"/>
          <circle cx="45" cy="45" r="8" stroke="#c8102e" stroke-width="1.2"/>
          <circle cx="45" cy="45" r="3.5" fill="#c8102e"/>
          <circle cx="47" cy="43" r="1.2" fill="#ff8090" opacity=".8"/>
          <line x1="45" y1="2"  x2="45" y2="18" stroke="#c9a84c" stroke-width="1" opacity=".5"/>
          <line x1="45" y1="72" x2="45" y2="88" stroke="#c9a84c" stroke-width="1" opacity=".5"/>
          <line x1="2"  y1="45" x2="18" y2="45" stroke="#c9a84c" stroke-width="1" opacity=".4"/>
          <line x1="72" y1="45" x2="88" y2="45" stroke="#c9a84c" stroke-width="1" opacity=".4"/>
          <path d="M45 2 L47 10 L45 8 L43 10 Z" fill="#c9a84c" opacity=".5"/>
          <path d="M45 88 L47 80 L45 82 L43 80 Z" fill="#c9a84c" opacity=".5"/>
        </svg>
      </div>
      <p>Нажми на сигил и произнеси приказ<br><br>
      <strong>«Куда сходить сегодня вечером?»</strong></p>
    </div>
  </div>

  <!-- Bottom -->
  <div id="bottom">
    <div id="wave">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div>
    </div>

    <button id="mic" aria-label="Speak">
      <svg id="i-mic"  viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 17.93A8.001 8.001 0 0 1 4 11H2a10 10 0 0 0 9 9.95V23h2v-2.05a10 10 0 0 0 9-9.95h-2a8 8 0 0 1-6.5 7.93V18.93z"/></svg>
      <svg id="i-stop" viewBox="0 0 24 24" style="display:none"><rect x="5" y="5" width="14" height="14" rx="1"/></svg>
      <svg id="i-spin" viewBox="0 0 24 24" style="display:none"><path opacity=".25" d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/><path d="M12 2a10 10 0 0 1 10 10h-2a8 8 0 0 0-8-8z"/></svg>
    </button>

    <div id="lbl">Говори с Zero</div>
  </div>
</div>

<div id="toast"></div>
<!-- Hidden audio player; becomes visible if autoplay is blocked -->
<audio id="player" style="display:none;position:fixed;bottom:8px;right:8px;z-index:10000;width:260px;" preload="none"></audio>

<script>
  const BACKEND = "http://localhost:8000";

  const chatEl   = document.getElementById("chat");
  const micBtn   = document.getElementById("mic");
  const wave     = document.getElementById("wave");
  const lbl      = document.getElementById("lbl");
  const iMic     = document.getElementById("i-mic");
  const iStop    = document.getElementById("i-stop");
  const iSpin    = document.getElementById("i-spin");
  const toastEl  = document.getElementById("toast");

  let recorder = null, chunks = [], state = "idle";

  // ── State machine ──────────────────────────────
  function set(s) {
    state = s;
    micBtn.className  = { recording: "recording", processing: "processing" }[s] || "";
    wave.className    = (s === "recording" || s === "speaking") ? "on" : "";
    iMic.style.display  = s === "idle"       ? "" : "none";
    iStop.style.display = s === "recording"  ? "" : "none";
    iSpin.style.display = s === "processing" ? "" : "none";
    lbl.className = s;
    lbl.textContent = {
      idle:       "Говори с Zero",
      recording:  "Слушаю... (нажми для остановки)",
      processing: "Обрабатываю приказ...",
      speaking:   "Zero отвечает...",
    }[s] || "";
    micBtn.disabled = s === "processing";
  }

  // ── Mic button ─────────────────────────────────
  micBtn.addEventListener("click", () => {
    if (state === "idle")      start();
    else if (state === "recording") stop();
  });

  async function start() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      const mime = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/ogg";
      recorder = new MediaRecorder(stream, { mimeType: mime });
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = process;
      recorder.start(100);
      document.getElementById("hint")?.remove();
      set("recording");
    } catch(e) { toast("Микрофон недоступен: " + e.message); }
  }

  function stop() {
    if (recorder && recorder.state !== "inactive") {
      recorder.stop();
      recorder.stream.getTracks().forEach(t => t.stop());
    }
    set("processing");
  }

  // ── Pipeline ───────────────────────────────────
  async function process() {
    const blob = new Blob(chunks, { type: recorder.mimeType });
    const ext  = recorder.mimeType.includes("webm") ? "webm" : "ogg";
    const form = new FormData();
    form.append("audio", blob, `q.${ext}`);

    const userEl    = addMsg("user", "🎤 ...");
    const thinkEl   = addThinking();

    try {
      const res  = await fetch(`${BACKEND}/voice-query`, { method: "POST", body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);

      console.log("Response OK. transcript:", data.transcript?.length, "audio_b64:", data.audio_b64?.length ?? "MISSING");
      userEl.querySelector(".bubble-text").textContent = data.transcript;
      thinkEl.remove();
      addMsg("ai", data.response_text, data.sources || []);
      await playB64(data.audio_b64);

    } catch(e) {
      thinkEl.remove();
      toast("Ошибка: " + e.message);
      set("idle");
    }
  }

  // ── Audio player element (DOM-connected avoids some autoplay blocks) ──
  const _player = document.getElementById("player");

  // Unlock AudioContext on first user gesture (required by Chrome)
  let _audioCtxUnlocked = false;
  document.addEventListener("click", () => { _audioCtxUnlocked = true; }, { once: true });

  async function playB64(b64) {
    if (!b64) { console.warn("playB64: no b64 data"); set("idle"); return; }
    console.log("playB64: received", b64.length, "chars");
    set("speaking");

    try {
      const binary = atob(b64);
      const bytes  = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob   = new Blob([bytes], { type: "audio/mpeg" });
      const url    = URL.createObjectURL(blob);

      // Use DOM audio element — more reliable than new Audio()
      _player.src = url;
      _player.load();

      return new Promise(resolve => {
        _player.onended = () => { URL.revokeObjectURL(url); set("idle"); resolve(); };
        _player.onerror = e => {
          console.error("Audio element error:", _player.error);
          URL.revokeObjectURL(url);
          set("idle"); resolve();
        };
        _player.play()
          .then(() => console.log("Audio playing OK"))
          .catch(e => {
            console.error("play() blocked:", e.name, e.message);
            // Show player controls so user can click play manually
            _player.style.display = "block";
            set("idle"); resolve();
          });
      });
    } catch(e) {
      console.error("playB64 exception:", e);
      set("idle");
    }
  }

  // ── Chat helpers ───────────────────────────────
  function addMsg(role, text, sources = []) {
    const el = document.createElement("div");
    el.className = `msg ${role}`;
    const lbl    = role === "ai" ? `<div class="bubble-label">Zero</div>` : "";
    const srcHtml = sources.length
      ? `<div class="sources"><div class="src-label">Источники</div>${
          sources.slice(0,4).map(s=>`<a href="${s.url}" target="_blank">${esc(s.title)}</a>`).join("")
        }</div>` : "";

    el.innerHTML = `
      <div class="avatar">${role==="ai" ? "◉" : "◎"}</div>
      <div class="bubble">${lbl}<span class="bubble-text">${esc(text)}</span>${srcHtml}</div>`;
    chatEl.appendChild(el);
    chatEl.scrollTop = chatEl.scrollHeight;
    return el;
  }

  function addThinking() {
    const el = document.createElement("div");
    el.className = "msg ai";
    el.innerHTML = `<div class="avatar">◉</div>
      <div class="bubble typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chatEl.appendChild(el);
    chatEl.scrollTop = chatEl.scrollHeight;
    return el;
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  let toastTimer;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 5000);
  }

  // ── Health check ───────────────────────────────
  (async () => {
    try {
      const r = await fetch(`${BACKEND}/health`, { signal: AbortSignal.timeout(3000) });
      if (!r.ok) throw new Error();
    } catch {
      document.getElementById("pip").className = "status-pip offline";
      toast("Бэкенд офлайн — запусти: uvicorn backend.main:app --port 8000");
    }
  })();
</script>
</body>
</html>
